<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT 2026 — Login Administrativo</title>
    <meta name="description" content="Acesse a área administrativa do XIII Fórum de Inovação e Tecnologia (FIT 2026) Crateús.">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fit.crateus.ufc.br/auth/login.html">
    <meta property="og:title" content="FIT 2026 — Login Administrativo">
    <meta property="og:description" content="Acesse a área administrativa do XIII Fórum de Inovação e Tecnologia (FIT 2026) Crateús.">
    <meta property="og:image" content="https://fit.crateus.ufc.br/fit_2026_avatar.png">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Supabase JS Client SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/particles.js"></script>
    <script src="../assets/js/supabase-config.js"></script>

    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        fit: {
                            orange: '#FF5F17',
                            yellow: '#FFC800',
                            red: '#ef4444',
                            text: '#1a1a1a',
                            muted: '#6b7280',
                            light: '#f5f5f5',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Admin CSS para Estados Dinâmicos -->
    <link rel="stylesheet" href="admin.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Círculos decorativos do fundo */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(0px);
            z-index: 0;
            pointer-events: none;
        }

        /* Clip diagonal do cabeçalho do card */
        .card-header-clip {
            clip-path: polygon(0 0, 100% 0, 100% 82%, 0 100%);
        }

        /* Avatar sobreposto */
        .avatar-wrapper {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }

        /* Input estilo linktree — clean */
        .fit-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            font-size: 0.9rem;
            color: #1a1a1a;
            background: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .fit-input:focus {
            border-color: #FF5F17;
            box-shadow: 0 0 0 3px rgba(255, 95, 23, 0.1);
            background: #fff;
        }
        .fit-input::placeholder {
            color: #9ca3af;
        }

        /* Botão laranja principal */
        .fit-btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #FF5F17, #FFC800);
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 0.02em;
        }
        .fit-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255, 95, 23, 0.3);
        }
        .fit-btn-primary:active {
            transform: translateY(0);
        }

        /* Erro */
        .login-error {
            display: none;
            color: #ef4444;
            font-size: 0.82rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 10px 14px;
            text-align: center;
            margin-bottom: 12px;
        }
        .login-error.show {
            display: block;
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden font-inter"
    style="background: #f0f0f0;">

    <!-- Canvas de Partículas -->
    <canvas id="particles-canvas"></canvas>

    <!-- Círculos decorativos do fundo (estilo da imagem) -->
    <div class="bg-blob w-56 h-56 bg-yellow-200 opacity-60" style="top: 60%; left: 2%; opacity: 0.5;"></div>
    <div class="bg-blob w-44 h-44 bg-orange-100 opacity-50" style="top: 10%; right: 5%;"></div>
    <div class="bg-blob w-36 h-36 bg-red-100 opacity-40" style="top: 65%; right: 8%;"></div>
    <div class="bg-blob w-28 h-28 bg-yellow-100 opacity-50" style="top: 5%; left: 15%;"></div>

    <!-- Loading Spinner -->
    <div id="loading-state" class="w-full flex flex-col items-center justify-center z-10">
        <div class="w-10 h-10 border-4 border-gray-200 border-t-fit-orange rounded-full animate-spin mb-3"></div>
        <p class="text-sm text-gray-400 font-medium">Verificando conexão...</p>
    </div>

    <!-- ════════ LOGIN WRAPPER ════════ -->
    <div id="login-wrapper" class="w-full flex items-center justify-center z-10">

        <!-- Box de Login do Administrador -->
        <div id="login-box"
            class="w-full max-w-[400px] bg-white rounded-3xl shadow-xl overflow-visible relative z-10 flex flex-col items-center pb-8"
            style="display: none;">

            <!-- Cabeçalho laranja com clip -->
            <div class="relative w-full h-0 flex-shrink-0" style="padding-bottom: 36%;">
                <div class="card-header-clip absolute inset-0"
                    style="background: linear-gradient(135deg, #FF5F17 0%, #FFC800 100%);">
                </div>
                <!-- Avatar sobreposto (fora do clip-path) -->
                <div class="avatar-wrapper">
                    <div class="w-[100px] h-[100px] rounded-full bg-white border-[5px] border-white shadow-[0_8px_24px_rgba(0,0,0,0.08)] flex items-center justify-center overflow-hidden">
                        <img src="../assets/img/logo-fit-2026.png" alt="FIT 2026 Avatar"
                            class="w-full h-full object-cover"
                            onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'text-2xl font-black text-gray-800\'>FIT</span>'">
                    </div>
                </div>
            </div>

            <!-- Conteúdo do card -->
            <div class="w-full px-7 mt-14 flex flex-col items-center">
                <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">FIT <span
                        class="bg-gradient-to-r from-fit-orange to-fit-yellow bg-clip-text text-transparent">2026</span></h2>
                <p class="text-sm text-gray-500 mt-0.5 font-medium">@fitcrateus</p>
                <p class="text-xs text-gray-400 mt-2 text-center leading-relaxed">
                    XIII Fórum de Inovação e Tecnologia — UFC Crateús
                </p>

                <!-- Separador -->
                <div class="w-full h-px bg-gray-100 my-5"></div>

                <!-- Erro -->
                <div id="login-error" class="login-error w-full"></div>

                <!-- Formulário -->
                <form id="login-form" class="w-full space-y-4">
                    <div>
                        <label for="login-email" class="block text-xs font-semibold text-gray-600 mb-1.5">Email</label>
                        <input type="email" id="login-email" placeholder="admin@fit.com"
                            class="fit-input" required>
                    </div>
                    <div>
                        <label for="login-password" class="block text-xs font-semibold text-gray-600 mb-1.5">Senha</label>
                        <input type="password" id="login-password" placeholder="••••••••"
                            class="fit-input" required>
                    </div>
                    <button type="submit" id="login-btn" class="fit-btn-primary">Entrar</button>
                </form>

                <!-- Rodapé do card -->
                <p class="text-center mt-5 text-[11px] text-gray-400">
                    © 2026 | Núcleo de Comunicação do FIT
                </p>
            </div>
        </div>
    </div>

    <!-- Toast de Notificação -->
    <div id="toast" class="toast"></div>

    <!-- Partículas e Login JS -->
    <script>
        initParticles('particles-canvas', {
            colors: ['rgba(255, 95, 23, 0.05)', 'rgba(255, 200, 0, 0.04)', 'rgba(200, 200, 200, 0.04)'],
            count: 6,
            maxRadius: 60,
            minRadius: 30,
            speedX: 0.3,
            speedY: 0.3
        });
    </script>
    <script type="module" src="js/login.js"></script>
</body>

</html>
