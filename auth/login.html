<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT 2026 — Login Administrativo</title>

    <!-- Google Fonts: Space Grotesk, Share Tech Mono e Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase JS Client SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-config.js"></script>

    <!-- Admin CSS -->
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <!-- Canvas de Partículas Dinâmicas Quentes -->
    <canvas id="particles-canvas"></canvas>

    <!-- ════════ LOGIN / SETUP WRAPPER ════════ -->
    <div id="login-wrapper" class="login-wrapper">
        
        <!-- Box de Setup do Banco Supabase (Caso chaves não estejam configuradas) -->
        <div id="setup-box" class="login-box" style="display: none;">
            <div class="card-header-gradient"></div>

            <div class="login-logo" style="margin-top: 24px;">
                <h1>FIT <span>2026</span></h1>
                <p>Configuração do Banco de Dados</p>
            </div>
            
            <div id="setup-error" class="login-error"></div>
            
            <form id="setup-db-form">
                <p style="font-size: 0.8rem; color: #4B5563; margin-bottom: 18px; text-align: center; font-family: 'Space Grotesk', sans-serif; line-height: 1.4; padding: 0 8px;">
                    Insira a URL e a Anon Key do Supabase para habilitar a autenticação de administradores e gerenciar os dados do site.
                </p>
                <div class="form-group">
                    <label for="setup-url">Supabase URL</label>
                    <input type="url" id="setup-url" placeholder="https://xxxxxxxxxxxxxx.supabase.co" required>
                </div>
                <div class="form-group">
                    <label for="setup-key">Supabase Anon Key</label>
                    <input type="password" id="setup-key" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6..." required>
                </div>
                <button type="submit" class="btn-login">Conectar Banco</button>
            </form>
        </div>

        <!-- Box de Login do Administrador -->
        <div id="login-box" class="login-box" style="display: none;">
            <div class="card-header-gradient"></div>

            <div class="login-logo" style="margin-top: 24px;">
                <h1>FIT <span>2026</span></h1>
                <p>Painel Administrativo</p>
            </div>

            <div id="login-error" class="login-error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" value="fit@crateus.ufc.br" placeholder="admin@fit.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" value="fitcrateus" placeholder="••••••••" required>
                </div>
                <button type="submit" id="login-btn" class="btn-login">Entrar</button>
            </form>

            <div style="display:flex;width:calc(100% - 64px);align-items:center;gap:12px;margin:20px 32px;">
                <div style="flex:1;height:1px;background:rgba(0,0,0,0.06);"></div>
                <span style="font-size:0.75rem;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px;font-family:'Share Tech Mono',monospace;">ou</span>
                <div style="flex:1;height:1px;background:rgba(0,0,0,0.06);"></div>
            </div>

            <button id="google-btn" type="button">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                </svg>
                Entrar com Google
            </button>

            <p style="text-align: center; margin-top: 20px; font-size: 0.8rem; font-family: 'Space Grotesk', sans-serif;">
                <a href="#" id="btn-show-setup" style="color: #FF5F17; text-decoration: none; font-weight: 600;">Configurar Conexão do Banco</a>
            </p>
        </div>
    </div>

    <!-- Elemento Toast para Notificações -->
    <div id="toast" class="toast"></div>

    <!-- Scripts de Partículas e Inicialização de Login -->
    <script>
        // ── Soft Ambient Floating Warm Particles Animation ──
        (function () {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const colors = ['rgba(255, 95, 23, 0.06)', 'rgba(255, 200, 0, 0.06)', 'rgba(28, 0, 255, 0.03)'];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.reset();
                }

                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height + canvas.height * 0.2;
                    this.radius = Math.random() * 80 + 40;
                    this.vx = Math.random() * 0.4 - 0.2;
                    this.vy = -(Math.random() * 0.4 + 0.1);
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.y + this.radius < 0) {
                        this.reset();
                    }
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 8; i++) {
                particles.push(new Particle());
            }

            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(loop);
            }
            loop();
        })();
    </script>
    <script src="login.js"></script>
</body>

</html>
