<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT 2026 — Em Breve</title>
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">

    <!-- SEO -->
    <meta name="description" content="FIT 2026 — O maior Fórum de Inovação e Tecnologia está chegando. Em breve.">
    <meta name="theme-color" content="#000000">
    <meta name="robots" content="index, follow">

    <!-- Fonte Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">

    <style>
        /* ── Reset ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 80px 24px;
        }

        /* ── Grid de fundo (placa de circuito) ── */
        .circuit-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.04;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ── Partículas (brancas) ── */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: #ffffff;
            opacity: 0;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                opacity: 0;
                transform: translateY(-20vh) scale(1);
            }
        }

        /* ── Vignette escuro nas bordas ── */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.7) 100%);
        }

        /* ── Conteúdo ── */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 32px;
            max-width: 750px;
        }

        /* ── Logo ── */
        .logo {
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: -1px;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeInDown 1s ease forwards 0.3s;
        }

        .logo-text {
            color: #ffffff;
        }

        .logo-year {
            color: #999999;
        }

        /* ── Linha fina ── */
        .divider {
            width: 50px;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 auto 32px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 0.5s;
        }

        /* ── AI visual (cérebro SVG) ── */
        .ai-icon-wrapper {
            margin-bottom: 36px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 0.6s;
        }

        .ai-icon-wrapper svg {
            width: 80px;
            height: 80px;
        }

        .brain-path {
            fill: none;
            stroke: #ffffff;
            stroke-width: 1.5;
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: drawBrain 3s ease forwards 1s;
        }

        .brain-dot {
            fill: #ffffff;
            opacity: 0;
            animation: dotAppear 0.5s ease forwards;
        }

        .brain-dot:nth-child(2) {
            animation-delay: 2s;
        }

        .brain-dot:nth-child(3) {
            animation-delay: 2.2s;
        }

        .brain-dot:nth-child(4) {
            animation-delay: 2.4s;
        }

        .brain-dot:nth-child(5) {
            animation-delay: 2.6s;
        }

        .brain-dot:nth-child(6) {
            animation-delay: 2.8s;
        }

        @keyframes drawBrain {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes dotAppear {
            to {
                opacity: 1;
            }
        }

        /* ── Tagline ── */
        .tagline {
            font-size: 0.75rem;
            font-weight: 500;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 0.7s;
        }

        /* ── Texto principal ── */
        .main-text {
            font-size: clamp(1.6rem, 4.5vw, 2.8rem);
            font-weight: 800;
            color: #ffffff;
            line-height: 1.25;
            letter-spacing: -1px;
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 1s;
        }

        .main-text .emphasis {
            color: #999999;
            font-style: italic;
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 400;
            color: #444444;
            line-height: 1.6;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 1.3s;
        }

        .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #ffffff;
            margin-left: 3px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ── EM BREVE ── */
        .em-breve {
            font-size: clamp(3rem, 10vw, 6.5rem);
            font-weight: 900;
            letter-spacing: -3px;
            color: transparent;
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.08);
            position: relative;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeInUp 1.2s ease forwards 1.6s;
        }

        .em-breve::before {
            content: 'EM BREVE';
            position: absolute;
            inset: 0;
            color: #ffffff;
            -webkit-text-stroke: 0;
            opacity: 0;
            animation: textReveal 2s ease forwards 2.8s;
        }

        @keyframes textReveal {
            0% {
                opacity: 0;
                clip-path: inset(0 100% 0 0);
            }

            100% {
                opacity: 1;
                clip-path: inset(0 0 0 0);
            }
        }

        /* ── Countdown ── */
        .countdown-mini {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 1.9s;
        }

        .cd-item {
            text-align: center;
        }

        .cd-number {
            display: block;
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffffff;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .cd-label {
            font-size: 0.6rem;
            font-weight: 500;
            color: #444444;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 6px;
        }

        .cd-separator {
            font-size: 1.8rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.1);
            line-height: 1;
        }

        /* ── Social ── */
        .social {
            display: flex;
            justify-content: center;
            gap: 16px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 2.2s;
        }

        .social a {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1rem;
            color: #444444;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social a:hover {
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        /* ── Texto AI no rodapé ── */
        .ai-hint {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            font-weight: 500;
            color: #333333;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 10;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 3s;
        }

        .ai-hint i {
            margin-right: 6px;
            font-size: 0.65rem;
        }

        /* ── Botão Voluntário ── */
        .btn-volunteer {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-decoration: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            margin-top: 48px;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 2.4s;
        }

        .btn-volunteer:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .btn-volunteer i {
            font-size: 1rem;
            color: #999999;
            transition: color 0.3s ease;
        }

        .btn-volunteer:hover i {
            color: #ffffff;
        }

        /* ── Grupo de Botões ── */
        .btn-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 48px;
            margin-bottom: 48px;
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #a1a1aa;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 2.5s;
        }

        .btn-secondary:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        /* Ajuste no botão voluntário para o grupo */
        .btn-volunteer {
            margin-top: 0;
            margin-bottom: 0;
        }

        /* ── Seção Organizadores (Realização) ── */
        .organizers-section {
            margin-bottom: 64px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 2.8s;
        }

        .organizers-title {
            font-size: 0.6rem;
            font-weight: 700;
            color: #333333;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 24px;
        }

        .organizers-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        .organizer-logo {
            height: 80px;
            width: auto;
            object-fit: contain;
            filter: grayscale(1) brightness(0.8) opacity(0.5);
            transition: all 0.4s ease;
        }

        .organizer-logo:hover {
            filter: grayscale(0) brightness(1) opacity(1);
            transform: scale(1.1);
        }

        /* ── Animações ── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Responsivo ── */
        @media (max-width: 640px) {
            .logo {
                margin-bottom: 36px;
                font-size: 1.6rem;
            }

            .tagline {
                letter-spacing: 3px;
                font-size: 0.65rem;
            }

            .em-breve {
                letter-spacing: -2px;
                -webkit-text-stroke-width: 1px;
            }

            .countdown-mini {
                gap: 16px;
            }

            .cd-number {
                font-size: 1.4rem;
            }

            .cd-separator {
                font-size: 1.4rem;
            }

            .ai-icon-wrapper svg {
                width: 60px;
                height: 60px;
            }

            .btn-volunteer {
                padding: 10px 22px;
                font-size: 0.85rem;
                width: 100%;
                justify-content: center;
            }

            .btn-secondary {
                padding: 10px 22px;
                font-size: 0.85rem;
                width: 100%;
                justify-content: center;
            }

            .btn-group {
                flex-direction: column;
                gap: 12px;
                margin-top: 32px;
                margin-bottom: 32px;
            }

            .organizers-section {
                margin-bottom: 48px;
            }

            .organizers-grid {
                gap: 24px;
                max-width: 100%;
            }

            .organizer-logo {
                height: 28px;
            }
        }
    </style>
</head>

<body>
    <!-- Background -->
    <div class="circuit-grid"></div>
    <div class="particles" id="particles"></div>
    <div class="vignette"></div>

    <!-- Conteúdo -->
    <div class="content">
        <div class="logo">
            <span class="logo-text">FIT</span>
            <span class="logo-year">2026</span>
        </div>

        <div class="divider"></div>

        <p class="tagline">XIII Fórum de Inovação e Tecnologia</p>

        <h1 class="main-text">
            Está chegando o maior<br>
            <span class="emphasis">Fórum de Inovação e Tecnologia</span>
        </h1>

        <p class="subtitle">
            Algo grande está sendo preparado para você<span class="cursor-blink"></span>
        </p>

        <div class="em-breve">EM BREVE</div>

        <div class="countdown-mini" id="countdown">
            <div class="cd-item">
                <span class="cd-number" id="cd-days">--</span>
                <span class="cd-label">Dias</span>
            </div>
            <span class="cd-separator">:</span>
            <div class="cd-item">
                <span class="cd-number" id="cd-hours">--</span>
                <span class="cd-label">Horas</span>
            </div>
            <span class="cd-separator">:</span>
            <div class="cd-item">
                <span class="cd-number" id="cd-minutes">--</span>
                <span class="cd-label">Min</span>
            </div>
            <span class="cd-separator">:</span>
            <div class="cd-item">
                <span class="cd-number" id="cd-seconds">--</span>
                <span class="cd-label">Seg</span>
            </div>
        </div>

        <div class="btn-group">
            <a href="https://forms.gle/WrNpp3KVtz7iWyfe7" target="_blank" class="btn-volunteer">
                <i class="fas fa-hands-helping"></i> Seja um Voluntário (Inscrições Encerradas)
            </a>
            <a href="https://fit.crateus.ufc.br/ano/2025" target="_blank" class="btn-secondary">
                <i class="fas fa-history"></i> Edição 2025 (em correção)
            </a>
        </div>

        <div class="organizers-section">
            <h4 class="organizers-title">Realização</h4>
            <div class="organizers-grid">
                <img src="assets/img/organizers/logo-fit-oficial.svg" alt="FIT Crateús" class="organizer-logo">
                <img src="assets/img/organizers/logo-ufc.png" alt="UFC" class="organizer-logo">
                <!-- <img src="assets/img/organizers/sebrae.svg" alt="Sebrae" class="organizer-logo"> -->
                <img src="assets/img/organizers/gsipp.png" alt="GSIPP" class="organizer-logo">
                <img src="assets/img/organizers/enginelab.png" alt="EngineLab" class="organizer-logo">
                <img src="assets/img/organizers/sparc.png" alt="SPARC" class="organizer-logo">
            </div>
        </div>

        <div class="social">
            <a href="https://www.instagram.com/fitcrateus/" target="_blank" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>

    <script>
        // Partículas brancas
        (function () {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 2 + 1;
                p.style.cssText = `
                    left: ${Math.random() * 100}%;
                    width: ${size}px;
                    height: ${size}px;
                    box-shadow: 0 0 ${size * 2}px rgba(255,255,255,0.3);
                    animation-duration: ${Math.random() * 14 + 8}s;
                    animation-delay: ${Math.random() * 10}s;
                `;
                container.appendChild(p);
            }
        })();

        // Countdown
        const eventDate = new Date('2026-10-04T08:00:00-03:00').getTime();
        function updateCountdown() {
            const diff = eventDate - Date.now();
            if (diff <= 0) return;
            const d = Math.floor(diff / 864e5);
            const h = Math.floor((diff % 864e5) / 36e5);
            const m = Math.floor((diff % 36e5) / 6e4);
            const s = Math.floor((diff % 6e4) / 1e3);
            document.getElementById('cd-days').textContent = String(d).padStart(2, '0');
            document.getElementById('cd-hours').textContent = String(h).padStart(2, '0');
            document.getElementById('cd-minutes').textContent = String(m).padStart(2, '0');
            document.getElementById('cd-seconds').textContent = String(s).padStart(2, '0');
        }
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>

</html>
